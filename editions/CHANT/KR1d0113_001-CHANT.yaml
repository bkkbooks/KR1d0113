body:
  text: 王氏喪服要記魯哀公祖載其父孔子曰寧設表門乎公曰不也夫表門起於禹禹治洪水故表其門以紀其功吾父無功何用焉太平御覽卷五百四十八寧設菰廬乎公曰菰廬起太伯太伯出奔聞古公薨還赴喪故作菰廬以彰其尸吾父無太伯之罪何用此為同上寧設五穀囊乎公曰不也五穀囊者起於伯夷叔齊讓國不食周粟而餓于首陽之山恐其魂之餓也故作五穀囊吾父食味含哺而死何用此為歐陽詢藝文類聚卷八十五太平御覽卷七百四寧設挂樹乎公曰不也挂樹者起於介子推子推晉之人也文公有內難出國之狄子推隨其行割肉以續軍糧後文公復國忽忘子推子推奉唱而歌文公始悟當授爵祿子推奔介山抱木而燒死國人葬之恐其神魂賈於地故作挂樹焉吾父生於宮殿死於枕席何用挂樹為酈道元水經注卷六寧設魂衣乎公曰魂衣起宛荊宛荊於山下道逢寒死羊角哀迎其屍恐神之寒故作魂衣吾父生服錦繡死於衣被何用此為太平御覽卷八百八十六寧設桐人乎公曰桐人起於虞卿齊人虞卿惡繼母不得養父死不得葬自知有過故作桐人吾父生得供養何桐人為太平御覽卷五百五十二寧設三桃湯乎公曰不也桃湯起於衛靈公有女嫁楚乳母送之道聞夫死欲將新婦還婦曰女有三從今屬於人死當卒哀因素車白馬進到夫家治三桃湯以沐死音出東北隅禮三終使死者不恨吾父無所恨何用桃湯焉太平御覽卷九百六十七案諸書散引首皆有魯哀公祖載其父孔子曰或作魯哀公葬父孔子問曰家宛斯先生繹史卷八十六孔子類記刪合訂為一篇茲據錄之間有脫字依原引補別子為祖諸侯母弟則不盡為祖矣杜佑通典卷七十三傅純問賀循喪服要記云云引王氏禮有親喪而君來弔則免絰貫左臂去杖迎拜于大門之外見馬首不哭先入門右庭中北面君升自東階南面哭主人乃哭君出又拜送大門外通典卷八十三按禮三年之喪終服不弔期之喪既練而弔大功之喪既葬而弔同上老疾三諫去者為舊君服𪗋通典卷九十引王肅賀循又云王賀要記庶子服出母父在服𪗋縗周父沒不服通典卷九十四殷仲堪引王賀首句據殷補為出繼母無服季祖鍾云繼母在如母出則為父所去不服也通典卷九十四引王肅首句據補周則沒閏通典卷一百王儉引鄭射王賀禮師弟子無服以弔服加麻臨之哭之於寢通典卷一百一司徒文子改葬其叔父間服於子思子思曰禮父母改葬緦而除不忍無服送至親也本有三年之服者道有遠近或有艱故既葬而除不待有三月之服也非父母無服無服則弔服加麻通典卷一百二有小功喪服改葬父母宜服改葬緦卒事反故服同上上句據通典補改葬緦既虞而除之同上棺毀見屍痛之極也今遇賊見毀理無輕重也同上引鄭康成王子雍斬縗之喪未葬主喪不徐通典卷一百三宋蔡廓問雷次宗引王肅
